server:
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:mscuentas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

